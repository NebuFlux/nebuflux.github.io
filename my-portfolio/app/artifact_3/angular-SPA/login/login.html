<div class="container-fluid">
    <div class="row my-5 justify-content-center align-items-center">
        <div class="col-12 col-lg-10 text-center">
            <h2>Welcome to the alert page for Inspector Gadget! Please login or signup below to view alerts from my Raspberry Pi IDS</h2>
        </div>
    </div>
    <div class="row justify-content-center align-items-center">
        <div class="col-12 col-md-6 col-lg-4 mx-auto">
            
            @if(!isSignupView){
            <form [formGroup]="loginForm" (ngSubmit)="doLogin()">
                @if(formError){
                <div role="alert" class="alert alert-danger">
                    {{ formError }}
                </div>
                }
                <div class="mb-3">
                    <label for="username" class="form-label">Name</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter Name"
                        formControlName="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="e.g 12+ alphanumerics" formControlName="password">
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <button type="submit" role="button" class="btn btn-primary">Sign In!</button>
                    <button type="button" class="btn btn-link" (click)="showSignup()">Sign up</button>
                </div>
            </form>
            }
            @else {
            <form [formGroup]="signupForm"  (ngSubmit)="doSignup()">
                @if(formError){
                <div role="alert" class="alert alert-danger">
                    {{ formError }}
                </div>
                }
                <div class="mb-3">
                    <label for="username" class="form-label">Name</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter Name"
                        formControlName="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="e.g 12+ alphanumerics" formControlName="password">
                </div>
                <div class="mb-3">
                    <label for="verifypwd" class="form-label">Verify Password</label>
                    <input type="password" class="form-control" id="verifypwd" name="verifypwd"
                        placeholder="e.g 12+ alphanumerics" formControlName="verifypwd">
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <button type="submit" role="button" class="btn btn-primary">Sign Up!</button>
                    <button type="button" class="btn btn-link" (click)="showLogin()">Login</button>
                </div>
            </form>
            }
        </div>
    </div>
</div>
